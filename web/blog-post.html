<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artículo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap">
  <link rel="stylesheet" href="/style.css">
  <style>
    .site-back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      font-size: 0.875rem;
      color: var(--text-secondary, #555);
      text-decoration: none;
      margin-bottom: 2rem;
      transition: color 150ms;
    }
    .site-back-link:hover { color: var(--accent, #B8391C); }
    .site-post-content h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }
    .site-post-date {
      display: block;
      font-size: 0.875rem;
      color: var(--text-muted, #888);
      margin-bottom: 2.5rem;
    }
    .site-post-body {
      font-size: 1.0625rem;
      line-height: 1.75;
      color: var(--text-primary, #1a1a1a);
      max-width: 68ch;
    }
    .site-post-body p { margin-bottom: 1.25rem; }
    .site-page-inner { max-width: 760px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }
  </style>
</head>
<body>
<div id="site-root"><div class="site-loading-init">Cargando…</div></div>
<script src="/site.js"></script>
<script>document.addEventListener('DOMContentLoaded', function(){ renderBlogPost(); });</script>
</body>
</html>
